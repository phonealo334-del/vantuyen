<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinPhat ERP - Hệ Thống Quản Lý Doanh Nghiệp</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/employee.css">
    <link rel="stylesheet" href="assets/css/contract.css">
    <link rel="stylesheet" href="assets/css/product.css">
    <link rel="stylesheet" href="assets/css/warehouse.css">
    <link rel="stylesheet" href="assets/css/customer.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2>🔷 TinPhat</h2>
                <p>ERP System</p>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#dashboard" class="menu-link active" data-page="dashboard"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                    <li><a href="#employee" class="menu-link" data-page="employee"><i class="fas fa-users"></i><span>Nhân Sự</span></a></li>
                    <li><a href="#contract" class="menu-link" data-page="contract"><i class="fas fa-file-contract"></i><span>Hợp Đồng</span></a></li>
                    <li><a href="#product" class="menu-link" data-page="product"><i class="fas fa-box"></i><span>Sản Phẩm</span></a></li>
                    <li><a href="#warehouse" class="menu-link" data-page="warehouse"><i class="fas fa-warehouse"></i><span>Kho Hàng</span></a></li>
                    <li><a href="#customer" class="menu-link" data-page="customer"><i class="fas fa-handshake"></i><span>Khách Hàng</span></a></li>
                    <li><a href="#finance" class="menu-link" data-page="finance"><i class="fas fa-wallet"></i><span>Tài Chính</span></a></li>
                    <li><a href="#report" class="menu-link" data-page="report"><i class="fas fa-chart-bar"></i><span>Báo Cáo</span></a></li>
                    <li><a href="#setting" class="menu-link" data-page="setting"><i class="fas fa-cog"></i><span>Cài Đặt</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="search-bar">
                    <input type="text" placeholder="🔍 Tìm kiếm...">
                </div>
                <div class="header-actions">
                    <button class="notification" title="Thông báo">
                        <i class="fas fa-bell"></i>
                    </button>
                    <div class="user-profile" id="userProfile">
                        <img src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" alt="Avatar">
                        <span id="userName">Người Dùng</span>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <div id="app"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/router.js"></script>
    <script>
        // Check if user is logged in
        window.addEventListener('load', () => {
            const isLoggedIn = sessionStorage.getItem('user_logged_in');
            const username = sessionStorage.getItem('username');
            
            if (!isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }
            
            // Update username in header
            if (username) {
                document.getElementById('userName').textContent = username.split('@')[0];
            }
        });

        // Logout function
        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // Add logout button to user profile
        document.getElementById('userProfile').addEventListener('click', () => {
            const confirmed = confirm('Bạn có chắc chắn muốn đăng xuất?');
            if (confirmed) {
                logout();
            }
        });
    </script>
</body>
</html>
