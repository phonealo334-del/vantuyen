<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - TinPhat ERP</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-form {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group.error input {
            border-color: var(--danger-color);
            background-color: rgba(239, 68, 68, 0.05);
        }

        .error-message {
            color: var(--danger-color);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .form-group.error .error-message {
            display: block;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--text-color);
        }

        .remember-forgot input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .remember-forgot a {
            color: var(--primary-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .remember-forgot a:hover {
            text-decoration: underline;
            color: var(--primary-dark);
        }

        .login-box p {
            text-align: center;
            color: var(--text-light);
            margin-top: 20px;
            font-size: 14px;
        }

        .login-box p a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .login-box p a:hover {
            color: var(--primary-dark);
        }

        .success-icon {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .success-icon i {
            font-size: 64px;
            color: var(--success-color);
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-login.loading span {
            margin-right: 8px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
        }

        .input-icon input {
            padding-left: 44px;
        }

        .demo-info {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border: 1px solid #93c5fd;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #1e40af;
        }

        .demo-info strong {
            display: block;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            
            <h1>🔐 TinPhat ERP</h1>
            <p>Hệ Thống Quản Lý Doanh Nghiệp</p>
            
            <div class="demo-info">
                <strong>📌 Tài Khoản Demo:</strong>
                Admin: admin@tinphat.com<br>
                Mật khẩu: 123456
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">Tên Đăng Nhập</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="admin@tinphat.com" required>
                    </div>
                    <div class="error-message">Vui lòng nhập tên đăng nhập</div>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật Khẩu</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="error-message">Vui lòng nhập mật khẩu chính xác</div>
                </div>
                
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" id="remember" name="remember">
                        Ghi nhớ tôi
                    </label>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn-login">
                    <span>Đăng Nhập</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
            
            <p>Chưa có tài khoản? <a href="#signup">Đăng Ký Ngay</a></p>
        </div>
    </div>

    <script>
        // Demo credentials database
        const credentials = {
            'admin@tinphat.com': '123456',
            'user@tinphat.com': '123456',
            'manager@tinphat.com': '123456'
        };

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');
        const successIcon = document.querySelector('.success-icon');

        // Load saved credentials if available
        window.addEventListener('load', () => {
            const savedUsername = localStorage.getItem('saved_username');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberCheckbox.checked = true;
            }
        });

        // Form validation
        function validateForm() {
            let isValid = true;

            // Validate username
            if (usernameInput.value.trim() === '') {
                usernameInput.parentElement.parentElement.classList.add('error');
                isValid = false;
            } else {
                usernameInput.parentElement.parentElement.classList.remove('error');
            }

            // Validate password
            if (passwordInput.value.trim() === '') {
                passwordInput.parentElement.parentElement.classList.add('error');
                isValid = false;
            } else {
                passwordInput.parentElement.parentElement.classList.remove('error');
            }

            return isValid;
        }

        // Check credentials
        function authenticateUser(username, password) {
            return credentials[username] === password;
        }

        // Remove error on input
        usernameInput.addEventListener('input', () => {
            usernameInput.parentElement.parentElement.classList.remove('error');
        });

        passwordInput.addEventListener('input', () => {
            passwordInput.parentElement.parentElement.classList.remove('error');
        });

        // Form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            const loginBtn = loginForm.querySelector('.btn-login');
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                // Simulate API call delay
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Verify credentials
                if (!authenticateUser(username, password)) {
                    passwordInput.parentElement.parentElement.classList.add('error');
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    return;
                }

                // Save credentials if remember me is checked
                if (rememberCheckbox.checked) {
                    localStorage.setItem('saved_username', username);
                } else {
                    localStorage.removeItem('saved_username');
                }

                // Save login session
                sessionStorage.setItem('user_logged_in', 'true');
                sessionStorage.setItem('username', username);
                sessionStorage.setItem('login_time', new Date().toISOString());
                sessionStorage.setItem('user_role', 'admin');

                // Show success
                loginForm.style.display = 'none';
                document.querySelectorAll('.login-box p').forEach(p => p.style.display = 'none');
                document.querySelector('.demo-info').style.display = 'none';
                successIcon.style.display = 'block';

                // Redirect after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                alert('Có lỗi xảy ra. Vui lòng thử lại!');
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement === passwordInput) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
